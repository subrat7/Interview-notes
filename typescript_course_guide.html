<script>
const TOPICS = [
  {id:1,t:"Introduction & Course Roadmap",ts:"00:00",sec:"setup",tag:"setup",desc:"Overview of everything covered in this TypeScript crash course — from basic types to React integration. Sets expectations for what you'll build and the progression from beginner concepts to advanced patterns like generics, discriminated unions, and custom hooks.",code:"// TypeScript: JavaScript with types\n<span class='kw'>const</span> greet = (name: <span class='kw'>string</span>): <span class='kw'>string</span> => {\n  <span class='kw'>return</span> <span class='str'>`Hello, ${name}!`</span>;\n};\ngreet(<span class='str'>\"World\"</span>); <span class='cm'>// ✓ valid</span>\ngreet(42);       <span class='cm'>// ✗ Argument of type 'number' is not assignable</span>"},
  {id:2,t:"Why Learn TypeScript?",ts:"02:51",sec:"setup",tag:"setup",desc:"TypeScript catches bugs at compile time instead of runtime. It provides IDE autocomplete, refactoring support, self-documenting code, and makes large codebases maintainable. Every major framework (React, Angular, Node) works seamlessly with TS — it's now an industry standard.",code:"<span class='cm'>// Without TS — bug discovered at runtime</span>\n<span class='kw'>function</span> add(a, b) { <span class='kw'>return</span> a + b; }\nadd(<span class='str'>\"5\"</span>, 3); <span class='cm'>// → \"53\" (bug!)</span>\n\n<span class='cm'>// With TS — bug caught immediately</span>\n<span class='kw'>function</span> add(a: <span class='kw'>number</span>, b: <span class='kw'>number</span>): <span class='kw'>number</span> {\n  <span class='kw'>return</span> a + b;\n}\nadd(<span class='str'>\"5\"</span>, 3); <span class='cm'>// ✗ Error: Argument of type 'string' not assignable</span>"},
  {id:3,t:"JavaScript vs. TypeScript Diagram",ts:"04:50",sec:"setup",tag:"setup",desc:"TypeScript is a strict superset of JavaScript — all valid JS is valid TS. TS adds optional static typing, interfaces, enums, and decorators. The TS compiler strips types and outputs plain JS that runs anywhere JavaScript runs. You get safety during development, zero cost at runtime.",code:"<span class='cm'>// TypeScript (superset of JS)</span>\n<span class='kw'>interface</span> User {\n  id: <span class='kw'>number</span>;\n  name: <span class='kw'>string</span>;\n  email?: <span class='kw'>string</span>; <span class='cm'>// optional</span>\n}\n\n<span class='cm'>// Compiles to plain JS:</span>\n<span class='cm'>// const user = { id: 1, name: \"Alice\" };</span>"},
  {id:4,t:"Writing Your First TypeScript Code",ts:"11:18",sec:"setup",tag:"setup",desc:"Create a .ts file, add type annotations to variables and functions, and run the TypeScript compiler. TypeScript provides inline error messages in editors like VS Code as you type. You'll see how adding types immediately changes the developer experience.",code:"<span class='cm'>// hello.ts</span>\n<span class='kw'>let</span> message: <span class='kw'>string</span> = <span class='str'>\"Hello TypeScript\"</span>;\n<span class='kw'>let</span> count: <span class='kw'>number</span> = 42;\n<span class='kw'>let</span> isDone: <span class='kw'>boolean</span> = <span class='kw'>false</span>;\n\n<span class='kw'>function</span> greet(name: <span class='kw'>string</span>): <span class='kw'>string</span> {\n  <span class='kw'>return</span> <span class='str'>`Hello, ${name}!`</span>;\n}\nconsole.log(greet(message));"},
  {id:5,t:"How TS Works: Compiler & AST",ts:"16:40",sec:"setup",tag:"setup",desc:"The TypeScript compiler pipeline: source code → Scanner (tokenizer) → Parser (builds AST) → Binder (creates symbol table) → Type Checker (validates types) → Emitter (outputs JS). Understanding this pipeline helps you understand where errors come from and why TS behaves the way it does.",code:"<span class='cm'>// Source: const x: number = 5;</span>\n<span class='cm'>// AST (simplified):</span>\n<span class='cm'>// VariableDeclaration</span>\n<span class='cm'>//   name: Identifier (\"x\")</span>\n<span class='cm'>//   type: NumberKeyword</span>\n<span class='cm'>//   initializer: NumericLiteral (5)</span>\n<span class='cm'>// Emitted JS: const x = 5;</span>"},
  {id:6,t:"The Parser & Abstract Syntax Tree",ts:"20:52",sec:"setup",tag:"setup",desc:"The parser converts tokens into a tree structure representing the code's syntax. Every statement, expression, and declaration becomes a node in this Abstract Syntax Tree (AST). Tools like ESLint, Prettier, and Babel all use ASTs to analyze and transform code.",code:"<span class='cm'>// AST Explorer: astexplorer.net</span>\n<span class='kw'>const</span> add = (a: <span class='kw'>number</span>, b: <span class='kw'>number</span>) => a + b;\n<span class='cm'>// → ArrowFunction node</span>\n<span class='cm'>//   params: [Parameter(a:number), Parameter(b:number)]</span>\n<span class='cm'>//   body: BinaryExpression(a + b)</span>"},
  {id:7,t:"The Binder & Symbol Tables",ts:"23:54",sec:"setup",tag:"setup",desc:"After parsing, the Binder traverses the AST and creates a symbol table mapping identifiers to their declarations. This resolves scope — which 'x' refers to which declaration. The binder creates the data structure that the type checker uses to verify types.",code:"<span class='kw'>const</span> x = 10;        <span class='cm'>// Symbol: x → NumberLiteral</span>\n<span class='kw'>function</span> foo() {\n  <span class='kw'>const</span> x = <span class='str'>\"inner\"</span>; <span class='cm'>// Different symbol: x → StringLiteral</span>\n  <span class='kw'>return</span> x;          <span class='cm'>// Resolves to inner x</span>\n}"},
  {id:8,t:"The Type Checker",ts:"25:50",sec:"setup",tag:"setup",desc:"The type checker is the heart of TypeScript — it traverses the bound AST and verifies that types are used correctly. It infers types where not annotated, checks assignments, validates function calls, and produces the error messages you see in your editor.",code:"<span class='kw'>let</span> name: <span class='kw'>string</span> = <span class='str'>\"Alice\"</span>;\nname = 42; <span class='cm'>// Type Checker: ✗ 'number' not assignable to 'string'</span>\n\n<span class='kw'>function</span> double(n: <span class='kw'>number</span>) { <span class='kw'>return</span> n * 2; }\ndouble(<span class='str'>\"hello\"</span>); <span class='cm'>// ✗ Argument of type 'string'...</span>"},
  {id:9,t:"The Emitter (Generating JS)",ts:"28:07",sec:"setup",tag:"setup",desc:"The final stage: the Emitter takes the type-checked AST and outputs JavaScript. It strips all type annotations, interfaces, and type-only constructs. The output can target different JS versions (ES5, ES2015+) based on tsconfig settings. Source maps are also emitted to link JS back to TS.",code:"<span class='cm'>// Input TypeScript:</span>\n<span class='kw'>interface</span> Point { x: <span class='kw'>number</span>; y: <span class='kw'>number</span>; }\n<span class='kw'>const</span> p: Point = { x: 1, y: 2 };\n\n<span class='cm'>// Emitted JavaScript (types stripped):</span>\n<span class='kw'>const</span> p = { x: 1, y: 2 };"},
  {id:10,t:"Project Setup & Installation",ts:"30:03",sec:"setup",tag:"setup",desc:"Install TypeScript globally or as a dev dependency. Use npm or yarn. You'll need Node.js. TypeScript adds the 'tsc' CLI command for compiling. VS Code has built-in TypeScript support for instant error highlighting without running the compiler manually.",code:"<span class='cm'># Install TypeScript</span>\nnpm install -D typescript\n\n<span class='cm'># Or globally</span>\nnpm install -g typescript\n\n<span class='cm'># Check version</span>\nnpx tsc --version\n\n<span class='cm'># Compile a file</span>\nnpx tsc hello.ts"},
  {id:11,t:"Generating tsconfig.json",ts:"33:41",sec:"setup",tag:"setup",desc:"tsconfig.json is the TypeScript project configuration file. Run 'tsc --init' to generate it. Key options: 'target' (output JS version), 'strict' (enables all strict checks), 'outDir' (where compiled JS goes), 'rootDir' (source directory), 'module' (module system).",code:"<span class='cm'>// tsconfig.json</span>\n{\n  <span class='str'>\"compilerOptions\"</span>: {\n    <span class='str'>\"target\"</span>: <span class='str'>\"ES2020\"</span>,\n    <span class='str'>\"strict\"</span>: <span class='kw'>true</span>,\n    <span class='str'>\"outDir\"</span>: <span class='str'>\"./dist\"</span>,\n    <span class='str'>\"rootDir\"</span>: <span class='str'>\"./src\"</span>,\n    <span class='str'>\"module\"</span>: <span class='str'>\"commonjs\"</span>\n  }\n}"},
  {id:12,t:"Running TypeScript (tsc)",ts:"37:43",sec:"setup",tag:"setup",desc:"Run 'tsc' to compile your entire project per tsconfig. Use 'tsc --watch' or 'tsc -w' to auto-recompile on file changes. 'ts-node' lets you run TS files directly without pre-compiling. For production, always compile to JS first.",code:"<span class='cm'># Compile once</span>\nnpx tsc\n\n<span class='cm'># Watch mode</span>\nnpx tsc --watch\n\n<span class='cm'># Run directly (dev only)</span>\nnpx ts-node src/index.ts\n\n<span class='cm'># Compile specific file</span>\nnpx tsc src/app.ts --outDir dist"},
  {id:13,t:"Type Inference vs. Annotation",ts:"43:05",sec:"fundamentals",tag:"fundamentals",desc:"TypeScript infers types from initial values automatically — you don't need to annotate everything. Explicit annotations are useful for function parameters, return types, and complex structures. The rule: annotate where inference can't figure it out or where you want to be explicit.",code:"<span class='cm'>// Inference — TS knows these are string and number</span>\n<span class='kw'>let</span> name = <span class='str'>\"Alice\"</span>; <span class='cm'>// inferred: string</span>\n<span class='kw'>let</span> age = 30;    <span class='cm'>// inferred: number</span>\n\n<span class='cm'>// Annotation — explicit for function params</span>\n<span class='kw'>function</span> greet(name: <span class='kw'>string</span>): <span class='kw'>string</span> {\n  <span class='kw'>return</span> <span class='str'>`Hi ${name}`</span>;\n}"},
  {id:14,t:"Basic Types (String, Number, Boolean)",ts:"47:26",sec:"fundamentals",tag:"fundamentals",desc:"The three primitive types in TypeScript mirror JavaScript primitives. 'string' for text, 'number' for all numeric values (integers and floats), 'boolean' for true/false. Always use lowercase versions — String/Number/Boolean (uppercase) refer to wrapper objects, not primitives.",code:"<span class='kw'>let</span> username: <span class='kw'>string</span> = <span class='str'>\"alice\"</span>;\n<span class='kw'>let</span> score: <span class='kw'>number</span> = 99.5;\n<span class='kw'>let</span> isActive: <span class='kw'>boolean</span> = <span class='kw'>true</span>;\n\n<span class='cm'>// Avoid uppercase — these are object wrappers</span>\n<span class='kw'>let</span> bad: String = <span class='str'>\"don't do this\"</span>;"},
  {id:15,t:"Union Types",ts:"49:33",sec:"types",tag:"types",desc:"A union type means a value can be one of several types. Written with the pipe '|' operator. You must narrow down the type before using type-specific methods. Unions are essential for modeling real-world data that can have multiple shapes.",code:"<span class='kw'>type</span> Id = <span class='kw'>string</span> | <span class='kw'>number</span>;\n\n<span class='kw'>function</span> printId(id: Id) {\n  <span class='kw'>if</span> (<span class='kw'>typeof</span> id === <span class='str'>\"string\"</span>) {\n    console.log(id.toUpperCase()); <span class='cm'>// ok — narrowed to string</span>\n  } <span class='kw'>else</span> {\n    console.log(id.toFixed(2)); <span class='cm'>// ok — narrowed to number</span>\n  }\n}"},
  {id:16,t:"The Problem with any",ts:"56:03",sec:"types",tag:"types",desc:"'any' disables TypeScript's type checking entirely for that value — it's an escape hatch that defeats the purpose of TypeScript. Avoid it in production code. It's contagious: accessing a property of 'any' also returns 'any'. Use 'unknown' instead for truly unknown values.",code:"<span class='kw'>let</span> val: <span class='kw'>any</span> = <span class='str'>\"hello\"</span>;\nval = 42;          <span class='cm'>// ok (no error)</span>\nval.toUpperCase(); <span class='cm'>// ok — but crashes at runtime!</span>\nval.foo.bar.baz;   <span class='cm'>// No error — TypeScript gives up</span>\n\n<span class='cm'>// Better: use unknown</span>\n<span class='kw'>let</span> safe: <span class='kw'>unknown</span> = fetchData();"},
  {id:17,t:"Type Narrowing & Guards",ts:"59:55",sec:"types",tag:"types",desc:"Narrowing is the process of refining a broader type to a more specific one inside a conditional block. TypeScript understands 'typeof', 'instanceof', 'in' operator, equality checks, and truthiness checks as type guards. After narrowing, you get full autocomplete for the specific type.",code:"<span class='kw'>function</span> process(val: <span class='kw'>string</span> | <span class='kw'>number</span>[]) {\n  <span class='kw'>if</span> (<span class='kw'>typeof</span> val === <span class='str'>\"string\"</span>) {\n    val.trim();   <span class='cm'>// string methods available</span>\n  } <span class='kw'>else</span> {\n    val.sort();   <span class='cm'>// array methods available</span>\n  }\n}"},
  {id:18,t:"The unknown Type",ts:"01:01:00",sec:"types",tag:"types",desc:"'unknown' is the type-safe counterpart of 'any'. You can assign anything to unknown, but you can't use it without first narrowing its type. This forces you to check what it actually is before using it. Perfect for API responses, error handling, and user input.",code:"<span class='kw'>function</span> parse(data: <span class='kw'>unknown</span>) {\n  <span class='cm'>// Must check before using</span>\n  <span class='kw'>if</span> (<span class='kw'>typeof</span> data === <span class='str'>\"string\"</span>) {\n    <span class='kw'>return</span> JSON.parse(data); <span class='cm'>// ok</span>\n  }\n  <span class='kw'>throw</span> <span class='kw'>new</span> Error(<span class='str'>\"Not a string!\"</span>);\n}"},
  {id:19,t:"Exhaustive Checks",ts:"01:06:35",sec:"types",tag:"types",desc:"Using 'never' for exhaustive checking ensures you've handled every case in a union. If you add a new variant to a union and forget to handle it, TypeScript will error at the 'never' fallback. This is a powerful pattern for keeping switch statements and if-chains complete.",code:"<span class='kw'>type</span> Shape = <span class='str'>\"circle\"</span> | <span class='str'>\"square\"</span> | <span class='str'>\"triangle\"</span>;\n\n<span class='kw'>function</span> area(s: Shape): <span class='kw'>number</span> {\n  <span class='kw'>switch</span>(s) {\n    <span class='kw'>case</span> <span class='str'>\"circle\"</span>:   <span class='kw'>return</span> Math.PI;\n    <span class='kw'>case</span> <span class='str'>\"square\"</span>:   <span class='kw'>return</span> 1;\n    <span class='kw'>case</span> <span class='str'>\"triangle\"</span>: <span class='kw'>return</span> 0.5;\n    <span class='kw'>default</span>: <span class='kw'>const</span> _: <span class='kw'>never</span> = s; <span class='kw'>return</span> _;\n  }\n}"},
  {id:20,t:"Custom Type Predicates (is)",ts:"01:10:35",sec:"types",tag:"types",desc:"A type predicate is a function that returns a boolean and tells TypeScript what type the value is if it returns true. Syntax: 'value is Type'. This lets you create reusable type guards for complex objects that 'typeof' can't handle.",code:"<span class='kw'>interface</span> Cat { meow(): <span class='kw'>void</span> }\n<span class='kw'>interface</span> Dog { bark(): <span class='kw'>void</span> }\n\n<span class='kw'>function</span> isCat(pet: Cat | Dog): pet <span class='kw'>is</span> Cat {\n  <span class='kw'>return</span> (pet <span class='kw'>as</span> Cat).meow !== undefined;\n}\n\n<span class='kw'>const</span> pet: Cat | Dog = getPet();\n<span class='kw'>if</span> (isCat(pet)) {\n  pet.meow(); <span class='cm'>// TypeScript knows it's a Cat</span>\n}"},
  {id:21,t:"Discriminated Unions",ts:"01:17:45",sec:"types",tag:"types",desc:"A discriminated union is a union of types that share a common literal property (the discriminant). TypeScript uses that literal to narrow the type in switch/if statements. This is the recommended pattern for modeling events, states, API responses, and actions in Redux.",code:"<span class='kw'>type</span> Result =\n  | { status: <span class='str'>\"ok\"</span>;    data: <span class='kw'>string</span> }\n  | { status: <span class='str'>\"error\"</span>; message: <span class='kw'>string</span> };\n\n<span class='kw'>function</span> handle(r: Result) {\n  <span class='kw'>if</span> (r.status === <span class='str'>\"ok\"</span>) {\n    console.log(r.data); <span class='cm'>// ok</span>\n  } <span class='kw'>else</span> {\n    console.log(r.message); <span class='cm'>// ok</span>\n  }\n}"},
  {id:22,t:"Type Assertion (as keyword)",ts:"01:23:10",sec:"types",tag:"types",desc:"Type assertion tells TypeScript 'trust me, I know the type'. Use 'as SomeType' or the angle bracket syntax '&lt;SomeType&gt;'. Use sparingly — you're overriding TypeScript's analysis. Common use: when you know more about a DOM element than TS can infer.",code:"<span class='cm'>// DOM: getElementById returns HTMLElement | null</span>\n<span class='kw'>const</span> input = document.getElementById(<span class='str'>\"name\"</span>) <span class='kw'>as</span> HTMLInputElement;\ninput.value = <span class='str'>\"Alice\"</span>; <span class='cm'>// ok — we asserted the type</span>\n\n<span class='cm'>// Double assertion for incompatible types (avoid!)</span>\n<span class='kw'>const</span> x = <span class='str'>\"hello\"</span> <span class='kw'>as unknown as</span> <span class='kw'>number</span>;"},
  {id:23,t:"unknown vs any Deep Dive",ts:"01:29:21",sec:"types",tag:"types",desc:"Key differences: 'any' bypasses all type checks (dangerous); 'unknown' requires type-checking before use (safe). Both can receive any value. But with 'unknown', TypeScript forces you to narrow before calling methods. Migrate from 'any' to 'unknown' for safer code.",code:"<span class='kw'>let</span> a: <span class='kw'>any</span>     = 5; a.toFixed(); <span class='cm'>// ✓ no error (risky)</span>\n<span class='kw'>let</span> u: <span class='kw'>unknown</span> = 5;\nu.toFixed(); <span class='cm'>// ✗ Error: Object is of type 'unknown'</span>\n\n<span class='kw'>if</span> (<span class='kw'>typeof</span> u === <span class='str'>\"number\"</span>) {\n  u.toFixed(); <span class='cm'>// ✓ ok after narrowing</span>\n}"},
  {id:24,t:"Handling Errors in Try/Catch",ts:"01:32:25",sec:"types",tag:"types",desc:"In TypeScript 4.0+, caught errors in try/catch are typed as 'unknown' (in strict mode) rather than 'any'. This forces you to check the type before using properties. Always narrow the error before accessing '.message' or other properties.",code:"<span class='kw'>try</span> {\n  JSON.parse(<span class='str'>\"{bad json}\"</span>);\n} <span class='kw'>catch</span> (err) {\n  <span class='cm'>// err is 'unknown' in strict mode</span>\n  <span class='kw'>if</span> (err <span class='kw'>instanceof</span> Error) {\n    console.error(err.message); <span class='cm'>// safe</span>\n  } <span class='kw'>else</span> {\n    console.error(<span class='str'>\"Unknown error\"</span>, err);\n  }\n}"},
  {id:25,t:"The never Type",ts:"01:35:14",sec:"types",tag:"types",desc:"'never' represents values that never occur. A function throwing always, an infinite loop, or an exhaustive switch default have type 'never'. It's also produced when you narrow a union until nothing is left. TypeScript uses it to detect unreachable code and ensure exhaustiveness.",code:"<span class='cm'>// Function that never returns</span>\n<span class='kw'>function</span> fail(msg: <span class='kw'>string</span>): <span class='kw'>never</span> {\n  <span class='kw'>throw</span> <span class='kw'>new</span> Error(msg);\n}\n\n<span class='cm'>// Narrowed to never — unreachable</span>\n<span class='kw'>function</span> check(x: <span class='kw'>string</span> | <span class='kw'>number</span>) {\n  <span class='kw'>if</span> (<span class='kw'>typeof</span> x === <span class='str'>\"string\"</span>) { }\n  <span class='kw'>else if</span> (<span class='kw'>typeof</span> x === <span class='str'>\"number\"</span>) { }\n  <span class='kw'>else</span> { <span class='kw'>const</span> _: <span class='kw'>never</span> = x; }\n}"},
  {id:26,t:"Type Aliases (type)",ts:"01:40:37",sec:"objects",tag:"objects",desc:"Type aliases let you name any type — primitives, unions, intersections, tuples, objects. They're reusable and composable. Unlike interfaces, type aliases can represent unions and primitive types. Use them to give meaningful names to complex type expressions.",code:"<span class='kw'>type</span> UserId = <span class='kw'>string</span> | <span class='kw'>number</span>;\n<span class='kw'>type</span> Point = { x: <span class='kw'>number</span>; y: <span class='kw'>number</span> };\n<span class='kw'>type</span> Status = <span class='str'>\"active\"</span> | <span class='str'>\"inactive\"</span> | <span class='str'>\"pending\"</span>;\n\n<span class='kw'>type</span> Response<T> = {\n  data: T;\n  error: <span class='kw'>string</span> | <span class='kw'>null</span>;\n  loading: <span class='kw'>boolean</span>;\n}"},
  {id:27,t:"Interfaces vs. Types",ts:"01:44:33",sec:"objects",tag:"objects",desc:"Interfaces are best for object shapes and can be extended/merged. Type aliases are more flexible — they can represent unions, tuples, and primitives. Key difference: interfaces can be reopened (declaration merging), type aliases cannot. For objects, both work; prefer interfaces for public APIs.",code:"<span class='cm'>// Interface — can be extended and merged</span>\n<span class='kw'>interface</span> Animal { name: <span class='kw'>string</span> }\n<span class='kw'>interface</span> Animal { age: <span class='kw'>number</span> } <span class='cm'>// merges!</span>\n\n<span class='cm'>// Type alias — cannot be reopened</span>\n<span class='kw'>type</span> Animal = { name: <span class='kw'>string</span> };\n<span class='cm'>// type Animal = { age: number }; ✗ duplicate"},
  {id:28,t:"Intersection Types",ts:"01:51:23",sec:"objects",tag:"objects",desc:"Intersection types combine multiple types into one using '&'. The result must satisfy all combined types. Useful for composing objects: combine a base type with additional properties. Similar to extending interfaces, but works with type aliases and complex types.",code:"<span class='kw'>type</span> Named  = { name: <span class='kw'>string</span> };\n<span class='kw'>type</span> Aged   = { age: <span class='kw'>number</span> };\n<span class='kw'>type</span> Person = Named & Aged;\n\n<span class='kw'>const</span> p: Person = { name: <span class='str'>\"Alice\"</span>, age: 30 };\n\n<span class='cm'>// Must have all properties from both types</span>"},
  {id:29,t:"Optional & Readonly Properties",ts:"01:54:43",sec:"objects",tag:"objects",desc:"Optional properties (?) can be undefined or omitted. Readonly properties can't be reassigned after object creation. Use readonly to model immutable data like configuration objects or initial state. TypeScript only enforces readonly at the type level — it's not a runtime guarantee.",code:"<span class='kw'>interface</span> Config {\n  <span class='kw'>readonly</span> apiUrl: <span class='kw'>string</span>;\n  timeout?: <span class='kw'>number</span>; <span class='cm'>// optional</span>\n}\n\n<span class='kw'>const</span> config: Config = { apiUrl: <span class='str'>\"https://api.example.com\"</span> };\nconfig.apiUrl = <span class='str'>\"other\"</span>; <span class='cm'>// ✗ Cannot assign to 'apiUrl'</span>\nconfig.timeout;          <span class='cm'>// type: number | undefined</span>"},
  {id:30,t:"Objects in TypeScript",ts:"01:58:06",sec:"objects",tag:"objects",desc:"Object types describe the shape of an object: what properties it has and their types. TypeScript checks that you don't access properties that don't exist. Inline object types work for one-off shapes; use interfaces or type aliases for reusable shapes.",code:"<span class='kw'>function</span> printUser(user: { name: <span class='kw'>string</span>; age: <span class='kw'>number</span> }) {\n  console.log(<span class='str'>`${user.name} is ${user.age}`</span>);\n}\n\n<span class='cm'>// Extra properties are fine if the shape matches</span>\nconst u = { name: <span class='str'>\"Bob\"</span>, age: 25, city: <span class='str'>\"NY\"</span> };\nprintUser(u); <span class='cm'>// ✓ structural compatibility</span>"},
  {id:31,t:"Duck Typing / Structural Typing",ts:"02:04:21",sec:"objects",tag:"objects",desc:"TypeScript uses structural typing: compatibility is based on shape, not names. If an object has all the required properties, it's compatible — even if it wasn't explicitly typed as that interface. This differs from nominal typing (Java/C#) where the type name matters.",code:"<span class='kw'>interface</span> Point { x: <span class='kw'>number</span>; y: <span class='kw'>number</span> }\n\n<span class='kw'>function</span> printPoint(p: Point) {\n  console.log(p.x, p.y);\n}\n\n<span class='cm'>// No explicit 'implements Point' needed:</span>\n<span class='kw'>const</span> pos = { x: 1, y: 2, z: 3 };\nprintPoint(pos); <span class='cm'>// ✓ has x and y — compatible!</span>"},
  {id:32,t:"Partial<T> Utility Type",ts:"02:11:12",sec:"objects",tag:"objects",desc:"Partial&lt;T&gt; creates a type where all properties of T are optional. Extremely useful for update functions where you only want to pass changed fields, or for function arguments where not all properties are required.",code:"<span class='kw'>interface</span> User { name: <span class='kw'>string</span>; age: <span class='kw'>number</span>; email: <span class='kw'>string</span> }\n\n<span class='kw'>function</span> updateUser(id: <span class='kw'>number</span>, patch: Partial<User>) {\n  <span class='cm'>// patch.name, patch.age, patch.email all optional</span>\n}\n\nupdateUser(1, { name: <span class='str'>\"Bob\"</span> }); <span class='cm'>// ✓ only name provided</span>"},
  {id:33,t:"Required<T> Utility Type",ts:"02:13:53",sec:"objects",tag:"objects",desc:"Required&lt;T&gt; is the opposite of Partial — it makes all optional properties required. Use it when you need to ensure a fully-populated object, such as after validation or database retrieval.",code:"<span class='kw'>interface</span> Config {\n  host?: <span class='kw'>string</span>;\n  port?: <span class='kw'>number</span>;\n}\n\n<span class='kw'>type</span> FullConfig = Required<Config>;\n<span class='cm'>// { host: string; port: number } — nothing optional</span>\n\n<span class='kw'>const</span> c: FullConfig = { host: <span class='str'>\"localhost\"</span>, port: 3000 };"},
  {id:34,t:"Pick<T> Utility Type",ts:"02:16:03",sec:"objects",tag:"objects",desc:"Pick&lt;T, K&gt; creates a type with only the specified properties from T. Use it to create subset types without duplicating property definitions. Great for creating DTOs, view models, or trimming objects before sending to an API.",code:"<span class='kw'>interface</span> User { id: <span class='kw'>number</span>; name: <span class='kw'>string</span>; email: <span class='kw'>string</span>; password: <span class='kw'>string</span> }\n\n<span class='kw'>type</span> PublicUser = Pick<User, <span class='str'>\"id\"</span> | <span class='str'>\"name\"</span> | <span class='str'>\"email\"</span>>;\n<span class='cm'>// { id: number; name: string; email: string }</span>\n<span class='cm'>// password is excluded!"},
  {id:35,t:"Omit<T> Utility Type",ts:"02:18:24",sec:"objects",tag:"objects",desc:"Omit&lt;T, K&gt; is the complement of Pick — it creates a type with all properties of T except the specified ones. Use it to exclude sensitive fields (like passwords), auto-generated fields (like IDs), or any properties you want to withhold.",code:"<span class='kw'>interface</span> User { id: <span class='kw'>number</span>; name: <span class='kw'>string</span>; password: <span class='kw'>string</span> }\n\n<span class='kw'>type</span> SafeUser = Omit<User, <span class='str'>\"password\"</span>>;\n<span class='cm'>// { id: number; name: string }</span>\n\n<span class='kw'>type</span> NewUser = Omit<User, <span class='str'>\"id\"</span>>; <span class='cm'>// before DB insert</span>"},
  {id:36,t:"Functions Basics",ts:"02:20:42",sec:"functions",tag:"functions",desc:"TypeScript allows you to annotate function parameter types and return types. If you omit the return type, TypeScript infers it. Always annotate parameters. Annotating return types is good practice for public functions — it catches bugs where you forget to return a value.",code:"<span class='cm'>// Parameter and return type annotations</span>\n<span class='kw'>function</span> add(a: <span class='kw'>number</span>, b: <span class='kw'>number</span>): <span class='kw'>number</span> {\n  <span class='kw'>return</span> a + b;\n}\n\n<span class='cm'>// Arrow function</span>\n<span class='kw'>const</span> multiply = (a: <span class='kw'>number</span>, b: <span class='kw'>number</span>): <span class='kw'>number</span> => a * b;"},
  {id:37,t:"void Return Type",ts:"02:25:21",sec:"functions",tag:"functions",desc:"'void' is used as the return type for functions that don't return a meaningful value (they just perform side effects). It's different from 'undefined' — a function typed as void can return undefined or nothing at all. Event handlers commonly return void.",code:"<span class='kw'>function</span> logMessage(msg: <span class='kw'>string</span>): <span class='kw'>void</span> {\n  console.log(msg); <span class='cm'>// no return</span>\n}\n\n<span class='cm'>// Event handler — doesn't return anything</span>\n<span class='kw'>const</span> onClick = (): <span class='kw'>void</span> => {\n  document.title = <span class='str'>\"Clicked!\"</span>;\n};"},
  {id:38,t:"Optional Parameters in Functions",ts:"02:26:00",sec:"functions",tag:"functions",desc:"Add '?' after a parameter name to make it optional. Optional parameters must come after required ones. Inside the function, the optional parameter's type is 'Type | undefined'. You can also use default parameter values as an alternative.",code:"<span class='kw'>function</span> greet(name: <span class='kw'>string</span>, title?: <span class='kw'>string</span>): <span class='kw'>string</span> {\n  <span class='kw'>if</span> (title) {\n    <span class='kw'>return</span> <span class='str'>`Hello, ${title} ${name}`</span>;\n  }\n  <span class='kw'>return</span> <span class='str'>`Hello, ${name}`</span>;\n}\n\ngreet(<span class='str'>\"Alice\"</span>);          <span class='cm'>// ok</span>\ngreet(<span class='str'>\"Alice\"</span>, <span class='str'>\"Dr.\"</span>);   <span class='cm'>// ok"},
  {id:39,t:"Arrays Basics",ts:"02:30:11",sec:"functions",tag:"functions",desc:"Arrays in TypeScript are typed to contain elements of a specific type. Two syntaxes: 'Type[]' or 'Array&lt;Type&gt;'. TypeScript prevents you from adding wrong types and gives you full autocomplete for array methods based on the element type.",code:"<span class='kw'>const</span> nums: <span class='kw'>number</span>[] = [1, 2, 3];\n<span class='kw'>const</span> strs: Array<<span class='kw'>string</span>> = [<span class='str'>\"a\"</span>, <span class='str'>\"b\"</span>];\n\nnums.push(4);      <span class='cm'>// ✓</span>\nnums.push(<span class='str'>\"five\"</span>); <span class='cm'>// ✗ Argument of type 'string'</span>\n\n<span class='cm'>// Mixed union array</span>\n<span class='kw'>const</span> mixed: (<span class='kw'>string</span> | <span class='kw'>number</span>)[] = [1, <span class='str'>\"two\"</span>, 3];"},
  {id:40,t:"Readonly Arrays",ts:"02:33:56",sec:"functions",tag:"functions",desc:"Readonly arrays prevent mutation — no push, pop, splice, or index assignment. Two syntaxes: 'readonly Type[]' or 'ReadonlyArray&lt;Type&gt;'. Use for function parameters that shouldn't be mutated, or for immutable collections. TS only enforces at compile time.",code:"<span class='kw'>const</span> nums: <span class='kw'>readonly number</span>[] = [1, 2, 3];\nnums.push(4);   <span class='cm'>// ✗ Property 'push' does not exist</span>\nnums[0] = 99;   <span class='cm'>// ✗ Cannot assign to read-only index</span>\n\n<span class='cm'>// Safe to pass anywhere — won't be mutated</span>\n<span class='kw'>function</span> sum(arr: ReadonlyArray<<span class='kw'>number</span>>): <span class='kw'>number</span> {\n  <span class='kw'>return</span> arr.reduce((a, b) => a + b, 0);\n}"},
  {id:41,t:"Tuples",ts:"02:36:07",sec:"functions",tag:"functions",desc:"Tuples are fixed-length arrays where each position has a specific type. They're useful for returning multiple values from a function, representing rows of data, or when position carries semantic meaning. React's useState returns a tuple.",code:"<span class='kw'>type</span> Point = [x: <span class='kw'>number</span>, y: <span class='kw'>number</span>];\n<span class='kw'>const</span> p: Point = [1, 2]; <span class='cm'>// ✓</span>\n<span class='kw'>const</span> [x, y] = p;        <span class='cm'>// destructure</span>\n\n<span class='cm'>// useState returns a tuple</span>\n<span class='kw'>const</span> [count, setCount] = useState<<span class='kw'>number</span>>(0);\n<span class='cm'>// count: number, setCount: Dispatch<SetStateAction<number>>"},
  {id:42,t:"Enums",ts:"02:39:43",sec:"functions",tag:"functions",desc:"Enums define a set of named constants. Numeric enums auto-increment from 0 by default. String enums require explicit values. 'const enum' is inlined at compile time for performance. Many developers prefer union string types ('\"up\" | \"down\"') over enums for simpler code.",code:"<span class='cm'>// Numeric enum</span>\n<span class='kw'>enum</span> Direction { Up, Down, Left, Right }\nDirection.Up <span class='cm'>// → 0</span>\n\n<span class='cm'>// String enum (preferred)</span>\n<span class='kw'>enum</span> Status {\n  Active  = <span class='str'>\"ACTIVE\"</span>,\n  Inactive = <span class='str'>\"INACTIVE\"</span>\n}\n\n<span class='cm'>// Alternative — union type</span>\n<span class='kw'>type</span> Dir = <span class='str'>\"up\"</span> | <span class='str'>\"down\"</span> | <span class='str'>\"left\"</span> | <span class='str'>\"right\"</span>;"},
  {id:43,t:"Classes Introduction",ts:"02:47:29",sec:"classes",tag:"classes",desc:"TypeScript adds type annotations to ES6 classes. You can type class properties and method parameters/returns. TypeScript classes compile to regular JavaScript classes. They support all OOP patterns: inheritance, encapsulation, polymorphism.",code:"<span class='kw'>class</span> Animal {\n  name: <span class='kw'>string</span>;\n  \n  constructor(name: <span class='kw'>string</span>) {\n    <span class='kw'>this</span>.name = name;\n  }\n  \n  speak(): <span class='kw'>string</span> {\n    <span class='kw'>return</span> <span class='str'>`${this.name} makes a sound`</span>;\n  }\n}"},
  {id:44,t:"Constructors",ts:"02:50:19",sec:"classes",tag:"classes",desc:"Constructors initialize class instances. TypeScript supports parameter properties — shorthand syntax to declare and assign class properties in one step using access modifiers in the constructor parameters. This reduces boilerplate significantly.",code:"<span class='kw'>class</span> User {\n  <span class='cm'>// Shorthand: declare & assign in constructor</span>\n  constructor(\n    <span class='kw'>public</span> name: <span class='kw'>string</span>,\n    <span class='kw'>private</span> age: <span class='kw'>number</span>,\n    <span class='kw'>readonly</span> id: <span class='kw'>number</span>\n  ) {}\n}\n\n<span class='kw'>const</span> u = <span class='kw'>new</span> User(<span class='str'>\"Alice\"</span>, 30, 1);\nconsole.log(u.name); <span class='cm'>// Alice"},
  {id:45,t:"Access Modifiers (Public, Private)",ts:"02:52:26",sec:"classes",tag:"classes",desc:"'public' (default) — accessible anywhere. 'private' — only accessible within the class itself. TypeScript also has the # private field syntax (ES2022 true private). Private members are type-checked by TS but not truly private in compiled JS unless using #.",code:"<span class='kw'>class</span> BankAccount {\n  <span class='kw'>private</span> balance: <span class='kw'>number</span> = 0;\n  <span class='kw'>public</span>  owner: <span class='kw'>string</span>;\n  \n  constructor(owner: <span class='kw'>string</span>) { <span class='kw'>this</span>.owner = owner; }\n  \n  deposit(amount: <span class='kw'>number</span>) { <span class='kw'>this</span>.balance += amount; }\n  getBalance() { <span class='kw'>return</span> <span class='kw'>this</span>.balance; }\n}"},
  {id:46,t:"Protected Modifier",ts:"02:54:38",sec:"classes",tag:"classes",desc:"'protected' members are accessible within the class and its subclasses, but not from outside. Use protected for properties that subclasses need but shouldn't be public API. Essential for building extensible class hierarchies.",code:"<span class='kw'>class</span> Animal {\n  <span class='kw'>protected</span> name: <span class='kw'>string</span>;\n  constructor(name: <span class='kw'>string</span>) { <span class='kw'>this</span>.name = name; }\n}\n\n<span class='kw'>class</span> Dog <span class='kw'>extends</span> Animal {\n  bark() {\n    console.log(<span class='str'>`${this.name} barks!`</span>); <span class='cm'>// ✓ ok</span>\n  }\n}\n\n<span class='kw'>const</span> d = <span class='kw'>new</span> Dog(<span class='str'>\"Rex\"</span>);\nd.name; <span class='cm'>// ✗ Property 'name' is protected"},
  {id:47,t:"Getters and Setters",ts:"02:58:58",sec:"classes",tag:"classes",desc:"Getters and setters provide computed properties with validation logic. A getter looks like a property access but runs a function. A setter intercepts assignments and can validate or transform the value. TypeScript types getters and setters automatically.",code:"<span class='kw'>class</span> Temperature {\n  <span class='kw'>private</span> _celsius: <span class='kw'>number</span> = 0;\n  \n  <span class='kw'>get</span> fahrenheit(): <span class='kw'>number</span> {\n    <span class='kw'>return</span> <span class='kw'>this</span>._celsius * 9/5 + 32;\n  }\n  \n  <span class='kw'>set</span> celsius(val: <span class='kw'>number</span>) {\n    <span class='kw'>if</span> (val < -273.15) <span class='kw'>throw</span> <span class='kw'>new</span> Error(<span class='str'>\"Below absolute zero!\"</span>);\n    <span class='kw'>this</span>._celsius = val;\n  }\n}"},
  {id:48,t:"Static Members",ts:"03:01:13",sec:"classes",tag:"classes",desc:"Static properties and methods belong to the class itself, not instances. Access them via ClassName.member. Useful for utility functions, factory methods, constants, and singleton patterns. Static members can't access 'this' referring to the instance.",code:"<span class='kw'>class</span> MathUtils {\n  <span class='kw'>static readonly</span> PI = 3.14159;\n  \n  <span class='kw'>static</span> circleArea(r: <span class='kw'>number</span>): <span class='kw'>number</span> {\n    <span class='kw'>return</span> MathUtils.PI * r * r;\n  }\n}\n\nMathUtils.circleArea(5);  <span class='cm'>// ✓ — no instance needed</span>\n<span class='kw'>const</span> m = <span class='kw'>new</span> MathUtils();\nm.circleArea(5);          <span class='cm'>// ✗ static, not on instance"},
  {id:49,t:"Abstract Classes",ts:"03:02:32",sec:"classes",tag:"classes",desc:"Abstract classes can't be instantiated directly — they serve as blueprints. Abstract methods must be implemented by subclasses. Use abstract classes when you want to share common implementation while forcing subclasses to implement certain methods.",code:"<span class='kw'>abstract class</span> Shape {\n  <span class='kw'>abstract</span> area(): <span class='kw'>number</span>; <span class='cm'>// must implement</span>\n  \n  describe(): <span class='kw'>string</span> {      <span class='cm'>// shared implementation</span>\n    <span class='kw'>return</span> <span class='str'>`Area: ${this.area()}`</span>;\n  }\n}\n\n<span class='kw'>class</span> Circle <span class='kw'>extends</span> Shape {\n  constructor(<span class='kw'>private</span> r: <span class='kw'>number</span>) { <span class='kw'>super</span>(); }\n  area() { <span class='kw'>return</span> Math.PI * <span class='kw'>this</span>.r ** 2; }\n}"},
  {id:50,t:"Interfaces & Generics Intro",ts:"03:06:58",sec:"generics",tag:"generics",desc:"Interfaces describe the shape of objects and can be implemented by classes. Generics allow writing reusable code that works with multiple types while maintaining type safety. Together they're the foundation of TypeScript's advanced type system.",code:"<span class='kw'>interface</span> Printable {\n  print(): <span class='kw'>void</span>;\n}\n\n<span class='kw'>class</span> Document <span class='kw'>implements</span> Printable {\n  print() { console.log(<span class='str'>\"Printing...\"</span>); }\n}\n\n<span class='cm'>// Generic — works with any type</span>\n<span class='kw'>function</span> identity<T>(value: T): T {\n  <span class='kw'>return</span> value;\n}"},
  {id:51,t:"Interfaces for Functions",ts:"03:10:48",sec:"generics",tag:"generics",desc:"Interfaces can describe function signatures — the parameter types and return type that a function must match. This lets you type callbacks, event handlers, and higher-order functions in a reusable way.",code:"<span class='kw'>interface</span> Transformer {\n  (input: <span class='kw'>string</span>): <span class='kw'>string</span>;\n}\n\n<span class='kw'>const</span> upper: Transformer = (s) => s.toUpperCase();\n<span class='kw'>const</span> trim: Transformer  = (s) => s.trim();\n\n<span class='kw'>function</span> apply(fn: Transformer, val: <span class='kw'>string</span>) {\n  <span class='kw'>return</span> fn(val);\n}"},
  {id:52,t:"Index Signatures",ts:"03:14:28",sec:"generics",tag:"generics",desc:"Index signatures allow objects to have dynamic keys while still being typed. Syntax: '[key: string]: ValueType'. Useful for dictionaries, lookup maps, and objects where the keys are not known at compile time.",code:"<span class='kw'>interface</span> Dictionary {\n  [key: <span class='kw'>string</span>]: <span class='kw'>string</span>;\n}\n\n<span class='kw'>const</span> colors: Dictionary = {\n  red: <span class='str'>\"#FF0000\"</span>,\n  blue: <span class='str'>\"#0000FF\"</span>,\n};\ncolors[<span class='str'>\"green\"</span>] = <span class='str'>\"#00FF00\"</span>; <span class='cm'>// ✓ dynamic key"},
  {id:53,t:"Interface Merging",ts:"03:16:33",sec:"generics",tag:"generics",desc:"Multiple interface declarations with the same name are merged automatically. This is called 'declaration merging'. It's how TypeScript allows augmenting existing library types — for example, adding properties to the global Window or Request object without modifying the original definition.",code:"<span class='kw'>interface</span> Window { myProp: <span class='kw'>string</span> }\n<span class='kw'>interface</span> Window { myMethod(): <span class='kw'>void</span> }\n<span class='cm'>// Both merge into one interface</span>\n\n<span class='cm'>// Augment Express Request</span>\n<span class='kw'>declare</span> global {\n  <span class='kw'>namespace</span> Express {\n    <span class='kw'>interface</span> Request { user?: User }\n  }\n}"},
  {id:54,t:"Generics Basics (<T>)",ts:"03:19:40",sec:"generics",tag:"generics",desc:"Generics let you write reusable components that work with any type, while still being type-safe. The 'T' is a type parameter — a placeholder for a real type provided when the function is called. This is how array methods like .map() and .filter() maintain type safety.",code:"<span class='cm'>// Without generics — loses type info</span>\n<span class='kw'>function</span> first(arr: <span class='kw'>any</span>[]): <span class='kw'>any</span> { <span class='kw'>return</span> arr[0]; }\n\n<span class='cm'>// With generics — type preserved</span>\n<span class='kw'>function</span> first<T>(arr: T[]): T | undefined {\n  <span class='kw'>return</span> arr[0];\n}\n\n<span class='kw'>const</span> n = first([1, 2, 3]);    <span class='cm'>// n: number</span>\n<span class='kw'>const</span> s = first([<span class='str'>\"a\"</span>, <span class='str'>\"b\"</span>]);   <span class='cm'>// s: string"},
  {id:55,t:"Multiple Generic Types",ts:"03:22:22",sec:"generics",tag:"generics",desc:"You can use multiple generic type parameters separated by commas. Common patterns: T for the main type, K for keys, V for values, E for errors. Generic constraints with 'extends' allow you to restrict what types can be used.",code:"<span class='kw'>function</span> pair<T, U>(first: T, second: U): [T, U] {\n  <span class='kw'>return</span> [first, second];\n}\n\npair(<span class='str'>\"hello\"</span>, 42); <span class='cm'>// [string, number]</span>\n\n<span class='cm'>// Constrained generic</span>\n<span class='kw'>function</span> getProperty<T, K <span class='kw'>extends</span> keyof T>(obj: T, key: K): T[K] {\n  <span class='kw'>return</span> obj[key];\n}"},
  {id:56,t:"Generic Interfaces",ts:"03:24:21",sec:"generics",tag:"generics",desc:"Interfaces can be generic too. This lets you describe data structures that work with any element type — like a generic API response wrapper, a paginated result type, or a typed event emitter.",code:"<span class='kw'>interface</span> ApiResponse<T> {\n  data: T;\n  status: <span class='kw'>number</span>;\n  message: <span class='kw'>string</span>;\n}\n\n<span class='kw'>type</span> UserResponse = ApiResponse<User>;\n<span class='kw'>type</span> PostsResponse = ApiResponse<Post[]>;\n\n<span class='kw'>async function</span> fetchUser(): Promise<ApiResponse<User>> {\n  <span class='kw'>return</span> fetch(<span class='str'>\"/api/user\"</span>).then(r => r.json());\n}"},
  {id:57,t:"Type Declarations (.d.ts)",ts:"03:29:32",sec:"generics",tag:"generics",desc:"Declaration files (.d.ts) contain only type information — no runtime code. They describe the types of JavaScript libraries that weren't written in TypeScript. The DefinitelyTyped project (@types/*) provides thousands of these for popular libraries.",code:"<span class='cm'>// myLib.d.ts — describes a JS library</span>\n<span class='kw'>declare</span> module <span class='str'>\"my-lib\"</span> {\n  <span class='kw'>export function</span> greet(name: <span class='kw'>string</span>): <span class='kw'>string</span>;\n  <span class='kw'>export const</span> version: <span class='kw'>string</span>;\n}\n\n<span class='cm'>// Install types for a library</span>\n<span class='cm'>// npm install -D @types/lodash"},
  {id:58,t:"Installing Libraries & Types (Axios)",ts:"03:34:56",sec:"generics",tag:"generics",desc:"Many npm libraries include their own TypeScript types. Others require a separate @types/* package. Axios ships with built-in types. Using typed libraries gives you full autocomplete for HTTP methods, request configs, and response handling.",code:"<span class='cm'># Axios ships its own types</span>\nnpm install axios\n\n<span class='cm'># Others need separate @types packages</span>\nnpm install -D @types/lodash\nnpm install -D @types/node\n\n<span class='cm'>// Usage with types</span>\n<span class='kw'>import</span> axios from <span class='str'>\"axios\"</span>;"},
  {id:59,t:"Fetching Data with Types",ts:"03:38:00",sec:"generics",tag:"generics",desc:"Use Axios's generic syntax to type API responses. Pass the expected response type to axios.get&lt;T&gt;(). TypeScript ensures you handle the data correctly. Always type your API responses to prevent mistakes when accessing nested properties.",code:"<span class='kw'>interface</span> User { id: <span class='kw'>number</span>; name: <span class='kw'>string</span>; email: <span class='kw'>string</span> }\n\n<span class='kw'>async function</span> getUser(id: <span class='kw'>number</span>): Promise<User> {\n  <span class='kw'>const</span> response = <span class='kw'>await</span> axios.get<User>(<span class='str'>`/api/users/${id}`</span>);\n  <span class='kw'>return</span> response.data; <span class='cm'>// typed as User</span>\n}"},
  {id:60,t:"Handling Axios Errors Safely",ts:"03:45:00",sec:"generics",tag:"generics",desc:"Axios throws AxiosError on non-2xx responses. Use 'axios.isAxiosError()' as a type guard to narrow the error and access .response, .message, and .code safely. Always wrap API calls in try/catch with proper error handling.",code:"<span class='kw'>import</span> axios, { AxiosError } <span class='kw'>from</span> <span class='str'>\"axios\"</span>;\n\n<span class='kw'>try</span> {\n  <span class='kw'>const</span> data = <span class='kw'>await</span> axios.get(<span class='str'>\"/api/data\"</span>);\n} <span class='kw'>catch</span> (err) {\n  <span class='kw'>if</span> (axios.isAxiosError(err)) {\n    console.error(err.response?.data);\n    console.error(err.message);\n  }\n}"},
  {id:61,t:"import type Syntax",ts:"03:51:52",sec:"generics",tag:"generics",desc:"'import type' imports only the type information — it's completely erased at compile time. This prevents accidentally importing runtime values when you only need types. It also makes your intent explicit and can speed up build tools.",code:"<span class='cm'>// Imports only the type — erased at runtime</span>\n<span class='kw'>import type</span> { User } <span class='kw'>from</span> <span class='str'>\"./types\"</span>;\n\n<span class='cm'>// vs regular import — might import runtime code</span>\n<span class='kw'>import</span> { User } <span class='kw'>from</span> <span class='str'>\"./types\"</span>;\n\n<span class='cm'>// Mix: import value and type together</span>\n<span class='kw'>import</span> axios, { <span class='kw'>type</span> AxiosResponse } <span class='kw'>from</span> <span class='str'>\"axios\"</span>;"},
  {id:62,t:"Setting up React with TypeScript",ts:"03:53:45",sec:"react",tag:"react",desc:"Create a React+TypeScript project using Vite: 'npm create vite@latest my-app -- --template react-ts'. This sets up tsconfig, types for React, and JSX support. You get typed props, hooks, events, and refs from the start.",code:"<span class='cm'># Create with Vite (recommended)</span>\nnpm create vite@latest my-app -- --template react-ts\n\n<span class='cm'># Or with Create React App</span>\nnpx create-react-app my-app --template typescript\n\n<span class='cm'># Key packages installed automatically:</span>\n<span class='cm'>// @types/react, @types/react-dom"},
  {id:63,t:"Creating & Typing Components",ts:"03:58:27",sec:"react",tag:"react",desc:"Define prop types as interfaces or type aliases. Pass the props type as a generic to React.FC or just annotate the destructured props parameter directly. Annotating props directly (without React.FC) is now preferred — it's more explicit and avoids React.FC quirks.",code:"<span class='kw'>interface</span> ButtonProps {\n  label: <span class='kw'>string</span>;\n  onClick: () => <span class='kw'>void</span>;\n  disabled?: <span class='kw'>boolean</span>;\n}\n\n<span class='kw'>function</span> Button({ label, onClick, disabled }: ButtonProps) {\n  <span class='kw'>return</span> &lt;button onClick={onClick} disabled={disabled}&gt;{label}&lt;/button&gt;\n}"},
  {id:64,t:"Typing useState Hook",ts:"04:03:36",sec:"react",tag:"react",desc:"useState is generic — it infers the type from the initial value. Pass an explicit type when the initial value is null or when you need more precision. The setter function's type is inferred automatically from the state type.",code:"<span class='cm'>// Inferred from initial value</span>\n<span class='kw'>const</span> [count, setCount] = useState(0); <span class='cm'>// number</span>\n\n<span class='cm'>// Explicit generic for null/complex types</span>\n<span class='kw'>const</span> [user, setUser] = useState<User | <span class='kw'>null</span>>(null);\n\n<span class='cm'>// Array state</span>\n<span class='kw'>const</span> [items, setItems] = useState<string[]>([]);"},
  {id:65,t:"Forms & Event Handling",ts:"04:13:08",sec:"react",tag:"react",desc:"React event types are in the @types/react package. Event objects are generic — pass the HTML element type. ChangeEvent for input changes, FormEvent for form submit, MouseEvent for clicks. TypeScript infers these when you define handlers inline.",code:"<span class='kw'>import</span> { FormEvent, ChangeEvent } <span class='kw'>from</span> <span class='str'>\"react\"</span>;\n\n<span class='kw'>function</span> handleSubmit(e: FormEvent<HTMLFormElement>) {\n  e.preventDefault();\n  <span class='cm'>// e.currentTarget is typed as HTMLFormElement</span>\n}"},
  {id:66,t:"Typing onChange Events",ts:"04:18:10",sec:"react",tag:"react",desc:"Input onChange events are typed as ChangeEvent&lt;HTMLInputElement&gt;. Access event.target.value for the input's value. For select elements, use ChangeEvent&lt;HTMLSelectElement&gt;. TypeScript gives you full autocomplete on the event's properties.",code:"<span class='kw'>const</span> [value, setValue] = useState(<span class='str'>\"\"</span>);\n\n<span class='kw'>const</span> handleChange = (e: ChangeEvent<HTMLInputElement>) => {\n  setValue(e.target.value);\n};\n\n<span class='kw'>return</span> &lt;input value={value} onChange={handleChange} /&gt;;"},
  {id:67,t:"Typing onSubmit Events",ts:"04:21:27",sec:"react",tag:"react",desc:"Form onSubmit receives a FormEvent&lt;HTMLFormElement&gt;. Always call e.preventDefault() to stop page reload. You can access form elements via e.currentTarget.elements. TypeScript ensures you don't forget to handle the event type correctly.",code:"<span class='kw'>const</span> onSubmit = (e: FormEvent<HTMLFormElement>) => {\n  e.preventDefault();\n  <span class='kw'>const</span> form = e.currentTarget;\n  <span class='kw'>const</span> data = <span class='kw'>new</span> FormData(form);\n  console.log(data.get(<span class='str'>\"email\"</span>));\n};"},
  {id:68,t:"PropsWithChildren & ReactNode",ts:"04:26:00",sec:"react",tag:"react",desc:"'children' in React is typed as ReactNode — anything React can render: elements, strings, numbers, arrays, null. Use PropsWithChildren&lt;P&gt; utility type to add children to your props. Alternatively, explicitly type 'children: ReactNode' in your interface.",code:"<span class='kw'>import</span> { PropsWithChildren, ReactNode } <span class='kw'>from</span> <span class='str'>\"react\"</span>;\n\n<span class='cm'>// Option 1: PropsWithChildren utility</span>\n<span class='kw'>type</span> CardProps = PropsWithChildren<{ title: <span class='kw'>string</span> }>;\n\n<span class='cm'>// Option 2: explicit children</span>\n<span class='kw'>interface</span> CardProps {\n  title: <span class='kw'>string</span>;\n  children: ReactNode;\n}"},
  {id:69,t:"Custom Hooks with Generics",ts:"04:31:33",sec:"react",tag:"react",desc:"Custom hooks can be generic to work with any data type. A generic useFetch hook can fetch any type of data while remaining fully typed. The return type is inferred, giving consumers full type safety when they use the hook.",code:"<span class='kw'>function</span> useFetch<T>(url: <span class='kw'>string</span>) {\n  <span class='kw'>const</span> [data, setData]     = useState<T | <span class='kw'>null</span>>(null);\n  <span class='kw'>const</span> [loading, setLoading] = useState(<span class='kw'>true</span>);\n  <span class='kw'>const</span> [error, setError]   = useState<Error | <span class='kw'>null</span>>(null);\n\n  <span class='cm'>// useEffect to fetch data...\n  \n  // Usage:</span>\n  <span class='kw'>const</span> { data } = useFetch<User[]>(<span class='str'>\"/api/users\"</span>);\n}"},
  {id:70,t:"Handling Axios Errors Safely",ts:"03:45:00",sec:"react",tag:"react",desc:"Bonus: The course rounds out with end-to-end patterns combining React state, TypeScript types, axios fetching, and generic hooks. You now have a full mental model from TS fundamentals to production React code with complete type safety at every layer.",code:"<span class='cm'>// Full picture: typed component + typed hook + typed API</span>\n<span class='kw'>interface</span> Post { id: <span class='kw'>number</span>; title: <span class='kw'>string</span> }\n\n<span class='kw'>function</span> Posts() {\n  <span class='kw'>const</span> { data: posts, loading } = useFetch<Post[]>(<span class='str'>\"/api/posts\"</span>);\n  <span class='kw'>if</span> (loading) <span class='kw'>return</span> &lt;p&gt;Loading...&lt;/p&gt;;\n  <span class='kw'>return</span> &lt;ul&gt;{posts?.map(p => &lt;li key={p.id}&gt;{p.title}&lt;/li&gt;)}&lt;/ul&gt;;\n}"},
];

const SECTIONS = [
  {id:"all",   label:"All Topics"},
  {id:"setup", label:"Setup"},
  {id:"fundamentals",label:"Fundamentals"},
  {id:"types", label:"Types"},
  {id:"objects",label:"Objects"},
  {id:"functions",label:"Functions"},
  {id:"classes",label:"Classes"},
  {id:"generics",label:"Generics"},
  {id:"react", label:"React"},
];

let activeSection = "all";
let searchTerm = "";

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = SECTIONS.map(s =>
    `<button class="${activeSection===s.id?'active':''}" onclick="setSection('${s.id}')">${s.label}</button>`
  ).join("");
}

function setSection(id) {
  activeSection = id;
  renderFilters();
  filterTopics();
}

function filterTopics() {
  searchTerm = document.getElementById("search-input").value.toLowerCase();
  const filtered = TOPICS.filter(t => {
    const matchSec = activeSection === "all" || t.sec === activeSection;
    const matchQ = !searchTerm || t.t.toLowerCase().includes(searchTerm) || t.desc.toLowerCase().includes(searchTerm);
    return matchSec && matchQ;
  });
  document.getElementById("s-shown").textContent = filtered.length;
  renderTopics(filtered);
}

function renderTopics(list) {
  const container = document.getElementById("topics-list");
  if (!list.length) {
    container.innerHTML = `<div class="no-results"><i class="ti ti-search" style="font-size:24px;display:block;margin-bottom:8px" aria-hidden="true"></i>No topics match your search</div>`;
    return;
  }
  container.innerHTML = list.map((t,i) => `
    <div class="topic-card" id="card-${t.id}">
      <div class="topic-header" onclick="toggleCard(${t.id})">
        <span class="topic-num">${String(i+1).padStart(2,'0')}</span>
        <span class="topic-title">${t.t}</span>
        <span class="topic-tag tag-${t.tag}">${t.sec}</span>
        <span class="topic-ts">${t.ts}</span>
        <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
      </div>
      <div class="topic-body" id="body-${t.id}">
        <p class="topic-desc">${t.desc}</p>
        <div class="code-snip"><pre>${t.code}</pre></div>
        <a class="yt-btn" href="https://www.youtube.com/watch?v=kvP6hDXWy88&t=${tsToSeconds(t.ts)}s" target="_blank">
          <i class="ti ti-brand-youtube" aria-hidden="true"></i> Watch at ${t.ts}
        </a>
      </div>
    </div>
  `).join("");
}

function toggleCard(id) {
  const card = document.getElementById(`card-${id}`);
  const body = document.getElementById(`body-${id}`);
  const isOpen = card.classList.contains("open");
  card.classList.toggle("open", !isOpen);
  body.classList.toggle("visible", !isOpen);
}

function tsToSeconds(ts) {
  const parts = ts.replace("01:","3600|").replace("02:","7200|").replace("03:","10800|").replace("04:","14400|").split("|");
  if (parts.length === 1) {
    const [h,m,s] = parts[0].split(":").map(Number);
    return h*3600+m*60+(s||0);
  }
  const base = parseInt(parts[0]);
  const [m,s] = parts[1].split(":").map(Number);
  return base+m*60+(s||0);
}

function tsToSeconds(ts) {
  const p = ts.split(":").map(Number);
  if (p.length === 2) return p[0]*60+p[1];
  return p[0]*3600+p[1]*60+p[2];
}

document.getElementById("s-total").textContent = TOPICS.length;
document.getElementById("s-section").textContent = SECTIONS.length-1;
renderFilters();
filterTopics();
</script>
